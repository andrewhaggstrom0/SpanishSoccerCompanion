<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Comentario · live Spanish vocab</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0B0E14; --panel:#121723; --panel-2:#0F1420; --line:#1E2636;
    --chalk:#E9E7E0; --muted:#8A93A6;
    --amber:#F2B33D; --red:#E5484D;
    --new:#5B8DEF; --learning:#F2B33D; --known:#3DD68C;
    --r:14px;
    --display:'Bricolage Grotesque',system-ui,sans-serif;
    --body:system-ui,-apple-system,'Segoe UI',sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--ink);color:var(--chalk);font-family:var(--body)}
  body{min-height:100vh;padding:18px 20px 40px}
  a{color:inherit}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    padding:14px 18px;background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);border-radius:var(--r)}
  .onair{display:flex;align-items:center;gap:10px;font-family:var(--mono);
    font-size:12px;letter-spacing:.18em;color:var(--amber);text-transform:uppercase}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--red);
    box-shadow:0 0 0 0 rgba(229,72,77,.7);animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(229,72,77,.55)}
    70%{box-shadow:0 0 0 9px rgba(229,72,77,0)}100%{box-shadow:0 0 0 0 rgba(229,72,77,0)}}
  .eq{display:flex;align-items:flex-end;gap:2px;height:16px}
  .eq i{width:3px;background:var(--amber);border-radius:2px;animation:bounce 1s infinite ease-in-out}
  .eq i:nth-child(2){animation-delay:.15s}.eq i:nth-child(3){animation-delay:.3s}
  .eq i:nth-child(4){animation-delay:.45s}.eq i:nth-child(5){animation-delay:.6s}
  @keyframes bounce{0%,100%{height:4px}50%{height:16px}}
  .paused .dot{background:var(--muted);animation:none}
  .paused .eq i{animation-play-state:paused;height:5px;background:var(--muted)}

  .title{font-family:var(--display);font-weight:800;font-size:22px;letter-spacing:-.02em;margin-right:auto}
  .title small{display:block;font-family:var(--body);font-weight:500;font-size:11px;
    letter-spacing:.04em;color:var(--muted);margin-top:1px}
  .stats{display:flex;gap:22px}
  .stat b{font-family:var(--mono);font-size:20px;display:block;line-height:1}
  .stat span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .search{background:var(--ink);border:1px solid var(--line);color:var(--chalk);
    border-radius:10px;padding:9px 12px;font-size:14px;width:170px;font-family:var(--body)}
  .search:focus{outline:2px solid var(--amber);outline-offset:1px}
  .toggle{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none}
  .toggle input{accent-color:var(--amber)}

  /* ---------- tabs ---------- */
  .tabs{display:flex;gap:4px;background:var(--ink);border:1px solid var(--line);border-radius:10px;padding:3px}
  .tab{font-family:var(--display);font-weight:700;font-size:13px;color:var(--muted);text-decoration:none;
    padding:6px 13px;border-radius:7px;letter-spacing:-.01em}
  .tab:hover{color:var(--chalk)}
  .tab.active{background:var(--panel);color:var(--chalk);box-shadow:inset 0 0 0 1px var(--line)}

  /* ---------- top counter ---------- */
  .counter{margin-top:16px;padding:14px 16px;background:var(--panel-2);
    border:1px solid var(--line);border-radius:var(--r)}
  .counter h2{font-family:var(--display);font-weight:700;font-size:13px;margin:0 0 10px;
    letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .ticker{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
  .chip{flex:0 0 auto;display:flex;align-items:center;gap:9px;background:var(--ink);
    border:1px solid var(--line);border-radius:999px;padding:7px 13px 7px 9px}
  .chip .rank{font-family:var(--mono);font-size:11px;color:var(--muted);width:18px;text-align:right}
  .chip .w{font-family:var(--display);font-weight:700;font-size:15px}
  .chip .n{font-family:var(--mono);font-size:12px;color:var(--amber)}
  .chip .t{font-size:12px;color:var(--muted)}

  /* ---------- board ---------- */
  .board{margin-top:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}
  .col{background:var(--panel-2);border:1px solid var(--line);border-radius:var(--r);
    min-height:200px;display:flex;flex-direction:column}
  .col[data-over="1"]{outline:2px dashed var(--accent);outline-offset:-4px}
  .col-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .col-head .swatch{width:10px;height:10px;border-radius:3px;background:var(--accent)}
  .col-head h3{font-family:var(--display);font-weight:800;font-size:16px;margin:0;letter-spacing:-.01em}
  .col-head .ct{margin-left:auto;font-family:var(--mono);font-size:13px;color:var(--muted)}
  .col[data-cat="new"]{--accent:var(--new)}
  .col[data-cat="learning"]{--accent:var(--learning)}
  .col[data-cat="known"]{--accent:var(--known)}
  .list{padding:12px;display:flex;flex-direction:column;gap:10px}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:24px 8px;line-height:1.5}

  /* ---------- card ---------- */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;
    padding:11px 12px;cursor:grab;border-left:3px solid var(--accent);transition:transform .08s,border-color .15s}
  .card:active{cursor:grabbing}
  .card.dragging{opacity:.45}
  .card:hover{border-color:#2C3650}
  .card .row{display:flex;align-items:baseline;gap:8px}
  .card .lemma{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-.01em}
  .card .pos{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
    border:1px solid var(--line);border-radius:5px;padding:1px 5px}
  .card .count{margin-left:auto;font-family:var(--mono);font-size:13px;color:var(--accent)}
  .card .trans{color:var(--chalk);font-size:14px;margin-top:3px}
  .card .trans.empty-t{color:var(--muted);font-style:italic}
  .bar{height:4px;border-radius:3px;background:var(--line);margin-top:9px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--accent);border-radius:3px}
  .card .ex{font-size:12px;color:var(--muted);margin-top:8px;display:none;line-height:1.45;
    border-top:1px solid var(--line);padding-top:7px;font-style:italic}
  .card.open .ex{display:block}
  .moves{display:flex;gap:6px;margin-top:9px}
  .moves button{flex:1;font-family:var(--body);font-size:11px;color:var(--muted);
    background:var(--ink);border:1px solid var(--line);border-radius:7px;padding:5px 4px;cursor:pointer}
  .moves button:hover{color:var(--chalk);border-color:var(--accent)}
  .moves button[disabled]{opacity:.3;cursor:default}
  .more{width:100%;font-family:var(--body);font-size:13px;color:var(--muted);
    background:transparent;border:1px dashed var(--line);border-radius:9px;
    padding:9px;cursor:pointer;margin-top:2px}
  .more:hover{color:var(--chalk);border-color:var(--muted)}

  @media(max-width:820px){
    .board{grid-template-columns:1fr}
    .title{margin-right:0;width:100%}
    .controls{width:100%}
    .search{flex:1}
  }
</style>
</head>
<body>
  <header class="topbar" id="topbar">
    <span class="onair"><span class="dot"></span>en vivo
      <span class="eq"><i></i><i></i><i></i><i></i><i></i></span>
    </span>
    <div class="title">Comentario<small>frequency &amp; vocab from live Spanish commentary</small></div>
    <nav class="tabs">
      <a class="tab active" href="index.html">Board</a>
      <a class="tab" href="flashcards.html">Flashcards</a>
    </nav>
    <div class="stats">
      <div class="stat"><b id="s-total">0</b><span>words heard</span></div>
      <div class="stat"><b id="s-unique">0</b><span>unique</span></div>
    </div>
    <div class="controls">
      <input class="search" id="search" placeholder="Search a word…" />
      <label class="toggle"><input type="checkbox" id="name-toggle" />show names</label>
      <label class="toggle"><input type="checkbox" id="fn-toggle" />show function words</label>
    </div>
  </header>

  <section class="counter">
    <h2>Most frequent</h2>
    <div class="ticker" id="ticker"></div>
  </section>

  <main class="board" id="board">
    <div class="col" data-cat="new">
      <div class="col-head"><span class="swatch"></span><h3>New</h3><span class="ct" id="ct-new">0</span></div>
      <div class="list" id="list-new"></div>
    </div>
    <div class="col" data-cat="learning">
      <div class="col-head"><span class="swatch"></span><h3>Learning</h3><span class="ct" id="ct-learning">0</span></div>
      <div class="list" id="list-learning"></div>
    </div>
    <div class="col" data-cat="known">
      <div class="col-head"><span class="swatch"></span><h3>Known</h3><span class="ct" id="ct-known">0</span></div>
      <div class="list" id="list-known"></div>
    </div>
  </main>

<script>
const USE_PERSISTENCE = true;          // set false in the inline preview
const POLL_MS = 1500;
const PAGE = 15;                       // words shown per column before "Show more"
const CATS = ["new","learning","known"];
const LABELS = {new:"New",learning:"Learning",known:"Known"};

// ---- demo data (only used when opened without the server) ----
const SAMPLE = {total_words:412,unique_words:9,words:[
 {lemma:"gol",pos:"NOUN",pos_label:"noun",count:14,is_function_word:false,translation:"goal",surface_forms:["gol","goles"],example_es:"¡y es el gol que cambia el partido!"},
 {lemma:"balón",pos:"NOUN",pos_label:"noun",count:31,is_function_word:false,translation:"ball",surface_forms:["balón"],example_es:"recupera el balón en el centro del campo"},
 {lemma:"marcar",pos:"VERB",pos_label:"verb",count:9,is_function_word:false,translation:"to score, to mark",surface_forms:["marca","marcó","marcando"],example_es:"podría marcar de cabeza si llega"},
 {lemma:"portero",pos:"NOUN",pos_label:"noun",count:7,is_function_word:false,translation:"goalkeeper",surface_forms:["portero"],example_es:"el portero adelanta su posición"},
 {lemma:"rápido",pos:"ADJ",pos_label:"adjective",count:6,is_function_word:false,translation:"fast, quick",surface_forms:["rápido","rápida"],example_es:"un contraataque muy rápido por la banda"},
 {lemma:"banda",pos:"NOUN",pos_label:"noun",count:11,is_function_word:false,translation:"wing, sideline",surface_forms:["banda"],example_es:"abre el juego hacia la banda derecha"},
 {lemma:"defensa",pos:"NOUN",pos_label:"noun",count:8,is_function_word:false,translation:"defense, defender",surface_forms:["defensa"],example_es:"la defensa se cierra bien"},
 {lemma:"peligro",pos:"NOUN",pos_label:"noun",count:5,is_function_word:false,translation:"danger",surface_forms:["peligro"],example_es:"esto es peligro puro en el área"},
 {lemma:"el",pos:"DET",pos_label:"determiner",count:48,is_function_word:true,translation:"the",surface_forms:["el","la","los"],example_es:"el balón al área"},
]};

const idOf = w => `${w.lemma}__${w.pos}`;
const state = {words:new Map(), cat:loadCats(), shown:{new:PAGE, learning:PAGE, known:PAGE}};

function loadCats(){
  if(!USE_PERSISTENCE) return {};
  try{ return JSON.parse(localStorage.getItem("vocabCats")||"{}"); }catch(e){ return {}; }
}
function saveCats(){
  if(!USE_PERSISTENCE) return;
  try{ localStorage.setItem("vocabCats", JSON.stringify(state.cat)); }catch(e){}
}

async function poll(){
  try{
    const r = await fetch("vocab.json?_="+Date.now(), {cache:"no-store"});
    if(!r.ok) throw 0;
    merge(await r.json());
    setLive(true);
  }catch(e){
    if(state.words.size===0){ merge(SAMPLE); setLive(false); }
  }
  render();
}
function merge(data){
  for(const w of (data.words||[])){
    const id = idOf(w);
    state.words.set(id, w);
    if(!(id in state.cat)) state.cat[id] = "new";
  }
}
function setLive(on){
  document.getElementById("topbar").classList.toggle("paused", !on);
}

function maxCount(){ let m=1; for(const w of state.words.values()) if(w.count>m) m=w.count; return m; }

function render(){
  const showFn = document.getElementById("fn-toggle").checked;
  const showNames = document.getElementById("name-toggle").checked;
  const q = document.getElementById("search").value.trim().toLowerCase();
  const all = [...state.words.values()]
    .filter(w => showFn || !w.is_function_word)
    .filter(w => showNames || w.pos !== "PROPN")
    .filter(w => !q || w.lemma.includes(q) || (w.translation||"").toLowerCase().includes(q))
    .sort((a,b)=> b.count - a.count);

  document.getElementById("s-total").textContent = [...state.words.values()].reduce((s,w)=>s+w.count,0);
  document.getElementById("s-unique").textContent = state.words.size;

  // top counter
  const mx = maxCount();
  document.getElementById("ticker").innerHTML = all.slice(0,12).map((w,i)=>`
    <div class="chip"><span class="rank">${i+1}</span>
      <span class="w">${w.lemma}</span>
      <span class="n">${w.count}</span>
      <span class="t">${esc(w.translation)||"—"}</span></div>`).join("") ||
    `<div class="empty">Waiting for audio…</div>`;

  // columns
  for(const cat of CATS){
    const items = all.filter(w => (state.cat[idOf(w)]||"new")===cat);
    document.getElementById("ct-"+cat).textContent = items.length;
    const limit = Math.min(state.shown[cat], items.length);
    const list = document.getElementById("list-"+cat);
    let html = items.slice(0, limit).map(w => card(w, mx)).join("");
    const remaining = items.length - limit;
    if(remaining > 0){
      html += `<button class="more" data-more="${cat}">Show ${Math.min(PAGE, remaining)} more · ${remaining} hidden</button>`;
    }
    list.innerHTML = html ||
      `<div class="empty">${cat==="new"?"New words land here as they're heard.":"Drag words here, or use the buttons."}</div>`;
  }
}

function card(w, mx){
  const id = idOf(w), pct = Math.max(6, Math.round(w.count/mx*100));
  const moves = CATS.filter(c=>c!==(state.cat[id]||"new"))
    .map(c=>`<button data-move="${id}" data-to="${c}">→ ${LABELS[c]}</button>`).join("");
  const trans = w.translation
    ? `<div class="trans">${esc(w.translation)}</div>`
    : `<div class="trans empty-t">translating…</div>`;
  const ex = w.example_es ? `<div class="ex">“${esc(w.example_es)}”</div>` : "";
  return `<div class="card" draggable="true" data-id="${id}">
    <div class="row"><span class="lemma">${esc(w.lemma)}</span>
      <span class="pos">${esc(w.pos_label)}</span>
      <span class="count">${w.count}×</span></div>
    ${trans}
    <div class="bar"><i style="width:${pct}%"></i></div>
    ${ex}
    <div class="moves">${moves}</div>
  </div>`;
}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

// ---- interactions ----
function resetPaging(){ state.shown = {new:PAGE, learning:PAGE, known:PAGE}; render(); }
document.getElementById("search").addEventListener("input", resetPaging);
document.getElementById("fn-toggle").addEventListener("change", resetPaging);
document.getElementById("name-toggle").addEventListener("change", resetPaging);

document.addEventListener("click", e=>{
  const more = e.target.closest("[data-more]");
  if(more){ state.shown[more.dataset.more] += PAGE; render(); return; }
  const mv = e.target.closest("[data-move]");
  if(mv){ state.cat[mv.dataset.move]=mv.dataset.to; saveCats(); render(); return; }
  const card = e.target.closest(".card");
  if(card && !e.target.closest(".moves")) card.classList.toggle("open");
});

// drag & drop between columns
let dragId = null;
document.addEventListener("dragstart", e=>{
  const c = e.target.closest(".card"); if(!c) return;
  dragId = c.dataset.id; c.classList.add("dragging");
});
document.addEventListener("dragend", e=>{
  const c = e.target.closest(".card"); if(c) c.classList.remove("dragging"); dragId=null;
  document.querySelectorAll(".col").forEach(col=>col.dataset.over="0");
});
document.querySelectorAll(".col").forEach(col=>{
  col.addEventListener("dragover", e=>{ e.preventDefault(); col.dataset.over="1"; });
  col.addEventListener("dragleave", ()=> col.dataset.over="0");
  col.addEventListener("drop", e=>{
    e.preventDefault(); col.dataset.over="0";
    if(dragId){ state.cat[dragId]=col.dataset.cat; saveCats(); render(); }
  });
});

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
